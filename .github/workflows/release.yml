name: "Release"
on:
  push:
    tags:
      - 'v*' # This triggers the workflow ONLY when you push a version tag like v1.1.1

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Install Node.js
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Rust
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Install Linux Dependencies (Only runs on the Linux machine)
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      # Install Frontend Dependencies
      - name: install frontend dependencies
        run: npm install # or yarn install, pnpm install, etc.

      # Build the App using the official Tauri Action
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: Hoshi-${{ github.ref_name }}
          releaseName: "Hoshi ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
