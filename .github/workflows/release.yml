name: "Manual Build (Mac & Linux)"

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundle: dmg
            os-name: Mac
          - platform: ubuntu-22.04
            bundle: appimage
            os-name: Linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Linux-specific dependencies
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: install frontend dependencies
        run: npm install

      - name: Build Tauri App
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Hoshi-${{ matrix.os-name }}-${{ matrix.bundle }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
